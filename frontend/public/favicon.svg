<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>

    <!-- Shield and Node Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Outer Background -->
  <circle cx="50" cy="50" r="46" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="2" />

  <!-- Connecting Network Lines (Federated Learning Nodes) -->
  <g stroke="rgba(99, 102, 241, 0.45)" stroke-width="1.5">
    <line x1="50" y1="22" x2="25" y2="40" />
    <line x1="50" y1="22" x2="75" y2="40" />
    <line x1="25" y1="40" x2="35" y2="72" />
    <line x1="75" y1="40" x2="65" y2="72" />
    <line x1="35" y1="72" x2="50" y2="82" />
    <line x1="65" y1="72" x2="50" y2="82" />
    
    <!-- Central connections to aggregation node -->
    <line x1="50" y1="22" x2="50" y2="52" />
    <line x1="25" y1="40" x2="50" y2="52" />
    <line x1="75" y1="40" x2="50" y2="52" />
    <line x1="35" y1="72" x2="50" y2="52" />
    <line x1="65" y1="72" x2="50" y2="52" />
  </g>

  <!-- Central Shield Path (Banking Security) -->
  <path d="M50,30 L70,38 L70,58 C70,70 50,80 50,80 C50,80 30,70 30,58 L30,38 Z" 
        fill="url(#shield-grad)" 
        filter="url(#glow)" />

  <!-- Shield Core Details (Keyhole/Lock or Central Node) -->
  <path d="M50,35 L64,41 L64,55 C64,64 50,72 50,72 C50,72 36,64 36,55 L36,41 Z" 
        fill="#030712" 
        opacity="0.85" />

  <!-- Glowing Nodes (Federated Banks) -->
  <circle cx="50" cy="22" r="4.5" fill="#38bdf8" filter="url(#glow)" /> <!-- top bank -->
  <circle cx="25" cy="40" r="4.5" fill="#6366f1" filter="url(#glow)" /> <!-- left bank -->
  <circle cx="75" cy="40" r="4.5" fill="#6366f1" filter="url(#glow)" /> <!-- right bank -->
  <circle cx="35" cy="72" r="4.5" fill="#0d9488" filter="url(#glow)" /> <!-- bottom-left bank -->
  <circle cx="65" cy="72" r="4.5" fill="#0d9488" filter="url(#glow)" /> <!-- bottom-right bank -->

  <!-- Central Collaborative Node (Aggregator) -->
  <circle cx="50" cy="52" r="5" fill="#f43f5e" filter="url(#glow)" />
</svg>
