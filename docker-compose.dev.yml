# Development overrides — hot reload, volume mounts, debug ports
version: "3.9"

services:
  api:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./backend:/app
    environment:
      - APP_DEBUG=true
      - APP_LOG_LEVEL=DEBUG

  worker:
    command: >
      celery -A app.infrastructure.celery_app worker
      --loglevel=debug
      --concurrency=1
      -E
    volumes:
      - ./backend:/app

  flower:
    command: >
      celery -A app.infrastructure.celery_app flower
      --port=5555
      --debug=true
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
