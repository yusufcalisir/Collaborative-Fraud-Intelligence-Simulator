# CFI Platform — Production Helm Values
# Override per-environment using: helm install cfi-platform . -f values-prod.yaml

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# ─── Aggregator (Central FL Server) ──────────────────────────────────────────
aggregator:
  replicaCount: 2
  image:
    repository: cfi-platform/aggregator
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /readyz
      initialDelaySeconds: 10
      periodSeconds: 5
  service:
    type: ClusterIP
    grpcPort: 50051
    httpPort: 8080
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ─── Bank Nodes (FL Clients) ──────────────────────────────────────────────────
bankNode:
  replicaCount: 3
  image:
    repository: cfi-platform/bank-node
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 8Gi
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 20
      periodSeconds: 10
    readiness:
      path: /readyz
      initialDelaySeconds: 10
      periodSeconds: 5
  hsm:
    enabled: true
    secretName: cfi-hsm-pkcs11-credentials
  service:
    type: ClusterIP
    grpcPort: 50052
    httpPort: 8081

# ─── Database (CockroachDB / PostgreSQL) ─────────────────────────────────────
database:
  url: "postgresql://cfi_user:changeme@cockroachdb-public:26257/cfi_platform?sslmode=require"
  secretName: cfi-db-credentials
  poolSize: 20
  maxOverflow: 10

postgresql:
  enabled: false

# ─── Message Queue ────────────────────────────────────────────────────────────
kafka:
  brokers: "kafka-broker-0:9093,kafka-broker-1:9093"
  saslUsername: "cfi_kafka_user"
  secretName: cfi-kafka-credentials

rabbitmq:
  url: "amqps://cfi_rabbit_user:changeme@rabbitmq:5671/"
  secretName: cfi-rabbitmq-credentials

# ─── Redis Feature Store ──────────────────────────────────────────────────────
redis:
  enabled: false
  url: "redis://redis-master:6379/0"
  secretName: cfi-redis-credentials

# ─── Vault PKI ────────────────────────────────────────────────────────────────
vault:
  enabled: true
  address: "https://vault.enterprise.local:8200"
  secretName: cfi-vault-token
  pkiRole: "cfi-node"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
  hosts:
    - host: cfi-aggregator.enterprise.local
      paths:
        - path: /
          pathType: Prefix
          service: aggregator
  tls:
    - secretName: cfi-tls-cert
      hosts:
        - cfi-aggregator.enterprise.local
