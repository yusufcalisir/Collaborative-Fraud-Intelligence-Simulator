apiVersion: v2
name: cfi-platform
description: Collaborative Fraud Intelligence (CFI) Platform - Privacy-Preserving Cross-Bank Fraud Detection using Federated Learning
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - federated-learning
  - fraud-detection
  - privacy-preserving
  - banking
home: https://github.com/yusufcalisir/Collaborative-Fraud-Intelligence-Simulator
maintainers:
  - name: CFI Platform Team
    email: cfi-platform@enterprise.local
dependencies:
  - name: postgresql
    version: ">=12.1.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ">=17.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
