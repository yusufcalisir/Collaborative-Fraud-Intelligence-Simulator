apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cfi-platform.fullname" . }}-config
  labels:
    {{- include "cfi-platform.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  DB_HOST: {{ .Values.postgresql.host | quote }}
  DB_PORT: {{ .Values.postgresql.port | quote }}
  DB_NAME: {{ .Values.postgresql.dbName | quote }}
  DB_USER: {{ .Values.postgresql.username | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  OTEL_ENABLED: {{ .Values.otel.enabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.exporterEndpoint | quote }}
  OIDC_ISSUER: {{ .Values.gateway.env.OIDC_ISSUER | quote }}
  OIDC_CLIENT_ID: {{ .Values.gateway.env.OIDC_CLIENT_ID | quote }}
  VAULT_URL: {{ .Values.gateway.env.VAULT_URL | quote }}
