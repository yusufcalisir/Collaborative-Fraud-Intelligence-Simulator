apiVersion: v1
kind: Service
metadata:
  name: {{ include "cfi-platform.fullname" . }}-frontend
  labels:
    {{- include "cfi-platform.labels" . | nindent 4 }}
    app: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "cfi-platform.selectorLabels" . | nindent 4 }}
    app: frontend
