services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d ${POSTGRES_DB:-fraud_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Gateway ─────────────────────────────
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${API_WORKERS:-1}
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=gateway
      - FL_COORDINATOR_URL=http://fl-coordinator:8001
      - IDENTITY_GRAPH_URL=http://identity-graph:8002
      - FRAUD_ALERT_URL=http://fraud-alert:8003
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-gateway
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fl-coordinator:
        condition: service_started
      identity-graph:
        condition: service_started
      fraud-alert:
        condition: service_started
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Federated Learning Coordinator ──────────
  fl-coordinator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=fl-coordinator
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-fl-coordinator
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Bank Client A ───────────────────────────
  bank-a:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8011
    ports:
      - "8011:8011"
    environment:
      - SERVICE_NAME=bank-a
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-bank-a
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Bank Client B ───────────────────────────
  bank-b:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8012
    ports:
      - "8012:8012"
    environment:
      - SERVICE_NAME=bank-b
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-bank-b
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Bank Client C ───────────────────────────
  bank-c:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8013
    ports:
      - "8013:8013"
    environment:
      - SERVICE_NAME=bank-c
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-bank-c
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Identity & Graph Resolver ───────────────
  identity-graph:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8002
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=identity-graph
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-identity-graph
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Fraud & Alert Engine ────────────────────
  fraud-alert:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8003
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=fraud-alert
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=cfi-fraud-alert
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.infrastructure.celery_app worker
      --loglevel=info
      --concurrency=2
      -E
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_storage:/app/app/storage
    restart: unless-stopped

  # ── Celery Flower (Monitoring) ──────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.infrastructure.celery_app flower
      --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - worker
    restart: unless-stopped

  # ── Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # ══════════════════════════════════════════════
  # OBSERVABILITY STACK
  # ══════════════════════════════════════════════

  # ── Jaeger (Distributed Tracing) ────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - ./monitoring/jaeger-ui-config.json:/etc/jaeger/ui-config.json:ro
    command:
      - "--query.ui-config=/etc/jaeger/ui-config.json"
    restart: unless-stopped

  # ── Prometheus (Metrics) ────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    extra_hosts:
      - "gateway:host-gateway"
      - "fl-coordinator:host-gateway"
      - "identity-graph:host-gateway"
      - "fraud-alert:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      - gateway
    restart: unless-stopped

  # ── Grafana (Dashboards) ────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  # ── MLflow Tracking Server ──────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    volumes:
      - ./backend/mlruns:/app/mlruns
    entrypoint: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /app/mlruns --default-artifact-root /app/mlruns
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  model_storage:
