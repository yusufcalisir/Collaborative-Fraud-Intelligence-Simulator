syntax = "proto3";

package cfi.fl.v1;

service FederatedLearningService {
  rpc RegisterClient (ClientRegisterRequest) returns (ClientRegisterResponse);
  rpc Heartbeat (stream ClientHeartbeat) returns (stream CoordinatorStatus);
  rpc StreamModelParameters (stream ParameterChunk) returns (AggregationAck);
  rpc DownloadGlobalModel (ModelDownloadRequest) returns (stream ModelChunk);
}

message ClientRegisterRequest {
  string bank_id = 1;
  string bank_name = 2;
  string certificate_fingerprint = 3;
  string software_version = 4;
}

message ClientRegisterResponse {
  string session_token = 1;
  int32 assigned_cluster_id = 2;
  bool is_accepted = 3;
}

message ClientHeartbeat {
  string bank_id = 1;
  int64 timestamp = 2;
  float cpu_utilization = 3;
  float memory_utilization = 4;
  int32 local_dataset_size = 5;
}

message CoordinatorStatus {
  enum Command {
    IDLE = 0;
    START_TRAINING = 1;
    CANCEL_ROUND = 2;
    UPDATE_CONFIG = 3;
  }
  Command command = 1;
  int32 current_round = 2;
  string global_model_version = 3;
}

message ParameterChunk {
  string bank_id = 1;
  int32 round_id = 2;
  int32 chunk_index = 3;
  int32 total_chunks = 4;
  bytes encrypted_payload = 5;
  bytes digital_signature = 6;
}

message AggregationAck {
  bool received = 1;
  string status_message = 2;
}

message ModelDownloadRequest {
  string bank_id = 1;
  string target_version = 2;
}

message ModelChunk {
  int32 chunk_index = 1;
  int32 total_chunks = 2;
  bytes chunk_data = 3;
  string sha256_checksum = 4;
}
