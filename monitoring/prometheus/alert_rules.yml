groups:
  - name: cfi_platform_alerts
    rules:
      - alert: HighGatewayLatency
        expr: http_request_duration_seconds_bucket{le="0.1"} < 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API Gateway 95th percentile latency elevated (>100ms)"
          description: "Gateway response time has exceeded 100ms for more than 5 minutes."

      - alert: HighClientDropoutRate
        expr: active_simulations > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "FL Client Dropout Rate Elevated"
          description: "More than 50% of registered bank clients dropped out during active FL rounds."

      - alert: SignificantConceptDrift
        expr: cfi_concept_drift_psi > 0.20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Significant Model Concept Drift Detected (PSI > 0.20)"
          description: "Population Stability Index on transaction risk scores exceeded critical 0.20 threshold. Automated re-training recommended."

      - alert: PoorModelCalibration
        expr: cfi_model_brier_score > 0.15
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Model Calibration Degradation (Brier Score > 0.15)"
          description: "Model probability predictions are miscalibrated relative to empirical fraud outcomes."
